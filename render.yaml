# Render Blueprint — deploy from GitHub: Dashboard → New → Blueprint → connect repo
# Docs: https://render.com/docs/infrastructure-as-code

databases:
  - name: consignment-db
    plan: free
    databaseName: consignment
    user: consignment

services:
  - type: web
    name: consignment-shop
    runtime: node
    plan: free
    branch: main
    buildCommand: npm ci && npx prisma generate && npx prisma db push && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: DATABASE_URL
        fromDatabase:
          name: consignment-db
          property: connectionString
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: NEXTAUTH_URL
        sync: false
      - key: NEXT_PUBLIC_SHOP_NAME
        value: My Consignment Shop
      - key: OWNER_INITIAL_PASSWORD
        sync: false
      - key: SETUP_SECRET
        sync: false
      - key: SEED_MODE
        value: production
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_SECURE
        value: "false"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
